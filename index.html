<html>
  <head>
    <title>Secure Chat App</title>
    <link rel="stylesheet" href="colors.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=search" />
    <link rel="stylesheet" href="material-icons.css">
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        font-family: "Helvetica", "Courier New";
        font-size: 20px;
        color: var(--text-color);
      }
      body {
        background-color: var(--bg-color);
      }
      .left-pane {
        width: 400px;
        height: 96vh;
        padding: 8px 0;
        margin: 2vh;
        background-color: var(--background-accent-color);
        border-radius: 20px;
      }
      .search-bar {
        width: 100%;
      }
      .search-bar input {
        width: 95%;
        margin-left: 8px;
        padding: 0 8px;
        border-radius: 8px;
        background-color: var(--accent-color);
        border: 0;
      }
      .search-bar input::placeholder {
        text-align: center;
        color: #afafaf;
      }
      .chats-list {
        margin: 0px 8px;
      }
      .chats-list div {
        width: 100%;
        font-size: 24px;
        margin: 8px 0;
        padding: 4px 8px;
        border-radius: 16px;
        background-color: var(--background-accent-color);
      }
      .chat-pane {
        width: calc(75% - 4vh);
        height: 96vh;
        margin: 2vh;
        background-color: #ffffff1f;
      }
      .log-in-button {
        position: absolute;
        padding: 4px 16px;
        border-radius: 9999px;
        right: 16px;
        top: 16px;
        background-color: var(--background-accent-color);
        font-weight: 400;
        font-size: 24px;
      }
      .quick-panel {
        background-color: var(--accent-color);
        width: 96%;
        height: 32px;
        border-radius: 16px;
        float: bottom;
      }
    </style>
    <link rel="stylesheet" href="utilities.css">
  </head>
  <body>
    <button class="log-in-button">
      Log In
    </button>
    <div class="left-pane vcenter space-between column">
      <div class="hcenter column full-width">
        <div class="search-bar hcenter">
          <input type="text" id="chats-search" placeholder="Search">
          <button class="square-button icon material-symbols-outlined">search</button>
        </div>
        <div class="chats-list" id="chats-list">
        </div>
      </div>

      <div class="quick-panel">
      </div>
    </div>
    <script>
      chats_list = document.getElementById("chats-list");
      addChat("Aaditya Parashar");
      addChat("Aarush Gambhir");
      addChat("Aayushi Jain");
      addChat("Avika Yadav");
      addChat("Anurag Kundra");
      function addChat(name) {
        chats_list.innerHTML += `<div>${name}</div>`;
      }
    </script>
  </body>
</html>
