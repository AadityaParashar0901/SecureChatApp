<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Secure Chat App</title>
		<link rel="stylesheet" href="style.css">
		<link rel="stylesheet" href="utilities.css">
		<link rel="stylesheet" href="material-icons.css">
		<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=done_all" />
	</head>
	<body>
		<div class="header flex space-between">
		</div>
		<div class="flex space-between row">
			<div class="flex center chats">
				<div class="chat">
					<p class="chat-name">Cat</p>
					<div class="flex center full-w">
						<span class="material-symbols-outlined">done_all</span>
						<p class="chat-last-message">Hello</p>
					</div>
				</div>
			</div>
			<div class="flex" id="chat-area">
				Hello
			</div>
		</div>
	</body>
</html>
